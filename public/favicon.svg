<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brand brown background with rounded corners matching card radius -->
  <rect width="32" height="32" rx="7" fill="#3C210C"/>

  <!-- Constellation lines radiating from centre node -->
  <line x1="16" y1="16" x2="5"  y2="6"  stroke="#C8A882" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="16" x2="27" y2="6"  stroke="#C8A882" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="16" x2="28" y2="20" stroke="#C8A882" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="16" x2="6"  y2="27" stroke="#C8A882" stroke-width="0.8" opacity="0.4"/>

  <!-- Satellite nodes -->
  <circle cx="5"  cy="6"  r="1.2" fill="#C8A882" opacity="0.55"/>
  <circle cx="27" cy="6"  r="1.2" fill="#C8A882" opacity="0.55"/>
  <circle cx="28" cy="20" r="1.2" fill="#C8A882" opacity="0.55"/>
  <circle cx="6"  cy="27" r="1.2" fill="#C8A882" opacity="0.55"/>

  <!-- Central node — accent amber disc -->
  <circle cx="16" cy="16" r="7.5" fill="#C8A882"/>

  <!-- Italic "I" — references the Iwan display logotype -->
  <text
    x="17" y="21"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="400"
    font-size="14"
    fill="#3C210C"
    text-anchor="middle"
  >I</text>
</svg>
