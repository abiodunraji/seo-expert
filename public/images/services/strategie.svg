      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F5FF" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Target icon -->
  <circle cx="400" cy="280" r="120" stroke="#00F5FF" stroke-width="3" fill="none"/>
  <circle cx="400" cy="280" r="80" stroke="#00F5FF" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="400" cy="280" r="40" stroke="#00F5FF" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="400" cy="280" r="8" fill="#00F5FF"/>
