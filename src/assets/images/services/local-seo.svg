<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0D1117"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#grid)" opacity="0.05"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F5FF" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Map pin -->
  <path d="M 400 180 C 400 180 320 260 320 340 C 320 384 356 420 400 420 C 444 420 480 384 480 340 C 480 260 400 180 400 180Z" stroke="#00F5FF" stroke-width="3" fill="none"/>
  <circle cx="400" cy="340" r="30" stroke="#00F5FF" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="400" cy="340" r="10" fill="#00F5FF" opacity="0.6"/>
  <!-- Radar rings -->
  <circle cx="400" cy="340" r="80" stroke="#00F5FF" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="400" cy="340" r="120" stroke="#00F5FF" stroke-width="1" fill="none" opacity="0.1"/>
  <!-- Corner brackets -->
  <path d="M 100 100 L 100 140 M 100 100 L 140 100" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <path d="M 700 100 L 700 140 M 700 100 L 660 100" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <path d="M 100 500 L 100 460 M 100 500 L 140 500" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <path d="M 700 500 L 700 460 M 700 500 L 660 500" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <text x="400" y="520" text-anchor="middle" font-family="monospace" font-size="14" fill="#00F5FF" opacity="0.5">LOCAL SEO</text>
</svg>
