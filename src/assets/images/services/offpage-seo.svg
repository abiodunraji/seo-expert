<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0D1117"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#grid)" opacity="0.05"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F5FF" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Link chain -->
  <rect x="280" y="260" width="100" height="80" rx="40" stroke="#00F5FF" stroke-width="3" fill="none" transform="rotate(-15 330 300)"/>
  <rect x="420" y="260" width="100" height="80" rx="40" stroke="#00F5FF" stroke-width="3" fill="none" transform="rotate(15 470 300)"/>
  <!-- Connection line -->
  <line x1="380" y1="300" x2="420" y2="300" stroke="#00F5FF" stroke-width="2" opacity="0.5"/>
  <!-- Nodes -->
  <circle cx="200" cy="200" r="8" fill="#00F5FF" opacity="0.3"/>
  <circle cx="600" cy="200" r="8" fill="#00F5FF" opacity="0.3"/>
  <circle cx="200" cy="400" r="8" fill="#00F5FF" opacity="0.3"/>
  <circle cx="600" cy="400" r="8" fill="#00F5FF" opacity="0.3"/>
  <!-- Connection lines -->
  <line x1="208" y1="200" x2="280" y2="260" stroke="#00F5FF" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="200" x2="520" y2="260" stroke="#00F5FF" stroke-width="1" opacity="0.3"/>
  <line x1="208" y1="400" x2="280" y2="340" stroke="#00F5FF" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="400" x2="520" y2="340" stroke="#00F5FF" stroke-width="1" opacity="0.3"/>
  <!-- Corner brackets -->
  <path d="M 100 100 L 100 140 M 100 100 L 140 100" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <path d="M 700 100 L 700 140 M 700 100 L 660 100" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <path d="M 100 500 L 100 460 M 100 500 L 140 500" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <path d="M 700 500 L 700 460 M 700 500 L 660 500" stroke="#00F5FF" stroke-width="2" opacity="0.3"/>
  <text x="400" y="520" text-anchor="middle" font-family="monospace" font-size="14" fill="#00F5FF" opacity="0.5">OFF-PAGE SEO</text>
</svg>
